name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Project Files
        run: |
          test -f index.html
          test -f Dockerfile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/employee-management-system:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/employee-management-system:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/employee-management-system:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-management-system:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-management-system:latest

      - name: Pipeline Completed
        run: echo "CI-CD Pipeline completed successfully."